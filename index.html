<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="favicon/favicon-16x16.png" type="image/x-icon">
    <script src="js/script.js"></script>

    <title>Pokédex</title>
</head>
<body>
    <main>
        <img src="" alt="pokemon" class="pokemonImagem">

        <h1 class="pokemonDados">
            <span class="pokemonNumero">6</span> -
            <span class="pokemonNome">charizard</span>
        </h1>

        <form class="formulario">
            <input 
                type="search"
                class="inputPesquisa"
                placeholder="Name or Number"
                required
            />
        </form>

        <div class="botoes">
            <button class="botao anterior">Anterior &lt; </button>
            <button class="botao proximo">Proximo &gt; </button>
        </div>




        <img src="imagens/pokedex.png" alt="pokedex" class="pokedex">

    </main>
    
</body>
</html>
